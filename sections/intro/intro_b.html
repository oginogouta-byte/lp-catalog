<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --intro-bg: #f8f6f3;
    --intro-title-color: #3a3a3a;
    --intro-text-color: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .intro-section {
    background: var(--intro-bg);
    font-family: 'Yu Mincho', 'Hiragino Mincho ProN', serif;
    overflow: hidden;
  }

  .intro-poem {
    font-size: 18px;
    font-weight: 400;
    color: var(--intro-title-color);
    letter-spacing: 0.25em;
    line-height: 2.4;
    text-align: center;
  }

  .intro-sub {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: var(--intro-text-color);
    line-height: 2;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .intro-section {
    padding: 64px 24px;
  }

  .intro-photo {
    background: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #999;
    letter-spacing: 0.08em;
    height: 160px;
  }

  .intro-poem { font-size: 16px; margin-bottom: 32px; }
  .intro-sub { margin-bottom: 40px; }

  .intro-collage {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .intro-photo--tall { height: 220px; }
  .intro-photo--wide { grid-column: 1 / -1; height: 180px; }

  /* ── PC ── */
  @media (min-width: 768px) {
    .intro-section {
      padding: 120px 40px;
    }

    .intro-text-area {
      margin: 0 auto 64px;
    }

    .intro-poem { font-size: 30px; margin-bottom: 48px; }
    .intro-sub { font-size: 22px; margin-bottom: 56px; }

    .intro-collage {
      gap: 12px;
    }

    .intro-photo { height: 280px; }
    .intro-photo--tall { height: 380px; }
    .intro-photo--wide { height: 300px; }
  }

  @media (min-width: 1200px) {
    .intro-poem { font-size: 34px; }
    .intro-sub { font-size: 24px; }
  }
</style>
</head>
<body>
  <section class="intro-section">
    <div class="intro-text-area">
      <p class="intro-poem">
        美しさとは、<br>
        自分らしく在ること。<br>
        心と身体が調和する、<br>
        その瞬間を届けたい。
      </p>
      <p class="intro-sub">
        一人ひとりの「なりたい」に寄り添いながら、<br>
        確かな技術と最新の知見で、あなたの美しさを引き出します。
      </p>
    </div>

    <div class="intro-collage">
      <div class="intro-photo intro-photo--tall">施術イメージ 1</div>
      <div class="intro-photo">施術イメージ 2</div>
      <div class="intro-photo intro-photo--wide">空間イメージ</div>
    </div>
  </section>
</body>
</html>
