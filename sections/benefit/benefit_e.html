<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .benefit-section {
    position: relative;
    padding: 50px 0;
    background: #2b2b2b;
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    overflow: hidden;
  }

  /* ぼかし背景プレースホルダー */
  .benefit-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #3a3a3a 0%, #1a1a1a 50%, #2b2b2b 100%);
    opacity: 0.6;
    filter: blur(0);
  }

  .benefit-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  /* ── 見出し ── */
  .benefit-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 8px;
  }

  .benefit-head-sub {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1.6;
  }

  .benefit-head-title {
    display: flex;
    align-items: baseline;
    color: #fff;
  }

  .benefit-head-num {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.14em;
    line-height: 1;
  }

  .benefit-head-text {
    font-size: 35px;
    font-weight: 900;
    letter-spacing: 0.17em;
    line-height: 1;
  }

  /* ── カードグリッド: SPデフォルト縦積み ── */
  .benefit-cards {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    max-width: 800px;
    margin-inline: auto;
    padding: 0 20px;
  }

  /* ── カード ── */
  .benefit-card {
    position: relative;
    width: 100%;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.62);
    border-radius: 6px;
    padding: 14px 0 0;
  }

  /* 番号（上に飛び出し） */
  .benefit-card-number {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .benefit-card-number span {
    font-size: 34px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
    font-style: italic;
  }

  /* タイトルボックス（ダーク背景 + コーナー装飾） */
  .benefit-card-titlebox {
    position: relative;
    width: 85%;
    background: #2b2b2b;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: auto;
    padding: 4px 10px;
  }

  /* コーナー装飾 */
  .benefit-card-corner {
    position: absolute;
    width: 16px;
    height: 16px;
  }

  .benefit-card-corner--tl {
    top: -7px;
    left: -7px;
    border-top: 2px solid #fff;
    border-left: 2px solid #fff;
  }

  .benefit-card-corner--br {
    bottom: -7px;
    right: -7px;
    border-bottom: 2px solid #fff;
    border-right: 2px solid #fff;
  }

  .benefit-card-title {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  .benefit-card-title--small {
    font-size: 18px;
  }

  /* 説明文 */
  .benefit-card-desc {
    padding: 12px 20px 20px;
    font-size: 15px;
    font-weight: 700;
    color: #2b2b2b;
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  /* ================================
     PC（min-width: 768px）
     ================================ */
  @media (min-width: 768px) {
    .benefit-section {
      padding: 120px 0;
    }

    .benefit-inner {
      gap: 64px;
    }

    .benefit-head-sub {
      font-size: 34px;
    }

    .benefit-head-num {
      font-size: 72px;
    }

    .benefit-head-text {
      font-size: 60px;
    }

    .benefit-cards {
      gap: 48px;
      padding: 0 40px;
    }

    .benefit-card {
      border-radius: 11px;
      padding-top: 40px;
    }

    .benefit-card-number {
      top: -32px;
    }

    .benefit-card-number span {
      font-size: 54px;
    }

    .benefit-card-titlebox {
      width: 85%;
      min-height: 80px;
      padding: 16px 20px;
    }

    .benefit-card-corner {
      width: 22px;
      height: 22px;
    }

    .benefit-card-corner--tl {
      top: -9px;
      left: -9px;
    }

    .benefit-card-corner--br {
      bottom: -9px;
      right: -9px;
    }

    .benefit-card-title {
      font-size: 32px;
    }

    .benefit-card-title--small {
      font-size: 28px;
    }

    .benefit-card-desc {
      font-size: 26px;
      padding: 20px 28px 32px;
    }
  }
</style>
</head>
<body>
  <section class="benefit-section">

    <div class="benefit-inner">

      <!-- 見出し -->
      <div class="benefit-head">
        <p class="benefit-head-sub">LINE登録者限定</p>
        <p class="benefit-head-title">
          <span class="benefit-head-num">5</span><span class="benefit-head-text">大特典</span>
        </p>
      </div>

      <!-- カードグリッド -->
      <div class="benefit-cards">

        <!-- 01 -->
        <div class="benefit-card">
          <div class="benefit-card-number"><span>01</span></div>
          <div class="benefit-card-titlebox">
            <div class="benefit-card-corner benefit-card-corner--tl"></div>
            <p class="benefit-card-title">特別選考ルートの<br>ご案内</p>
            <div class="benefit-card-corner benefit-card-corner--br"></div>
          </div>
          <p class="benefit-card-desc">通常とは別枠の、LINE登録者<br>限定特別ルートをご案内</p>
        </div>

        <!-- 02 -->
        <div class="benefit-card">
          <div class="benefit-card-number"><span>02</span></div>
          <div class="benefit-card-titlebox">
            <div class="benefit-card-corner benefit-card-corner--tl"></div>
            <p class="benefit-card-title">プレミアムスカウト</p>
            <div class="benefit-card-corner benefit-card-corner--br"></div>
          </div>
          <p class="benefit-card-desc">書類選考や一次面接を<br>スキップできる<br>特別スカウトが届くことも！</p>
        </div>

        <!-- 03 -->
        <div class="benefit-card">
          <div class="benefit-card-number"><span>03</span></div>
          <div class="benefit-card-titlebox">
            <div class="benefit-card-corner benefit-card-corner--tl"></div>
            <p class="benefit-card-title">カジュアル面談</p>
            <div class="benefit-card-corner benefit-card-corner--br"></div>
          </div>
          <p class="benefit-card-desc">選考の前に、<br>まずは「質問だけ」の<br>気軽な面談が可能に</p>
        </div>

        <!-- 04 -->
        <div class="benefit-card">
          <div class="benefit-card-number"><span>04</span></div>
          <div class="benefit-card-titlebox">
            <div class="benefit-card-corner benefit-card-corner--tl"></div>
            <p class="benefit-card-title">非公開求人の案内</p>
            <div class="benefit-card-corner benefit-card-corner--br"></div>
          </div>
          <p class="benefit-card-desc">LINEでしか公開されない<br>限定求人をいち早くチェック</p>
        </div>

        <!-- 05 -->
        <div class="benefit-card">
          <div class="benefit-card-number"><span>05</span></div>
          <div class="benefit-card-titlebox">
            <div class="benefit-card-corner benefit-card-corner--tl"></div>
            <p class="benefit-card-title benefit-card-title--small">限定ウェビナー<br>イベント先行案内</p>
            <div class="benefit-card-corner benefit-card-corner--br"></div>
          </div>
          <p class="benefit-card-desc">会社説明会や、<br>未経験転職ノウハウを<br>学べるイベントへご招待</p>
        </div>

      </div>
    </div>
  </section>
</body>
</html>
