<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .footer {
    padding: 32px 20px;
    background: #1a1a1a;
    text-align: center;
    font-family: -apple-system, sans-serif;
  }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 16px;
  }
  .footer-links a {
    font-size: 13px;
    color: #888;
    text-decoration: none;
    transition: color 0.15s;
  }
  .footer-links a:hover { color: #fff; }
  .footer .copy {
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>
  <footer class="footer">
    <div class="footer-links">
      <a href="#">利用規約</a>
      <a href="#">プライバシーポリシー</a>
      <a href="#">お問い合わせ</a>
    </div>
    <p class="copy">&copy; 2024 Sample Company, Inc. All rights reserved.</p>
  </footer>
</body>
</html>
