<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .benefit-section {
    padding: 80px 20px;
    background: #f9fafb;
    font-family: -apple-system, sans-serif;
  }
  .benefit-section h2 {
    font-size: 28px;
    font-weight: 800;
    color: #111;
    text-align: center;
    margin-bottom: 56px;
  }
  .benefit-rows { max-width: 800px; margin-inline: auto; }
  .benefit-row {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 56px;
  }
  .benefit-row:last-child { margin-bottom: 0; }
  .benefit-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6366f1;
    font-weight: 600;
    min-height: 200px;
  }
  .benefit-text {}
  .benefit-text h3 {
    font-size: 20px;
    font-weight: 700;
    color: #111;
    margin-bottom: 12px;
  }
  .benefit-text p {
    font-size: 15px;
    color: #555;
    line-height: 1.8;
  }
  @media (min-width: 768px) {
    .benefit-section { padding: 120px 40px; }
    .benefit-section h2 { font-size: 44px; margin-bottom: 80px; }
    .benefit-row { gap: 36px; margin-bottom: 80px; }
    .benefit-img { min-height: 360px; }
    .benefit-text h3 { font-size: 32px; margin-bottom: 20px; }
    .benefit-text p { font-size: 26px; }
  }
</style>
</head>
<body>
  <section class="benefit-section">
    <h2>導入で変わる3つのポイント</h2>
    <div class="benefit-rows">
      <div class="benefit-row">
        <div class="benefit-img">IMAGE</div>
        <div class="benefit-text">
          <h3>業務時間を50%削減</h3>
          <p>手作業で行っていたルーティン業務を自動化。チームメンバーがより創造的な業務に集中できる環境を実現します。</p>
        </div>
      </div>
      <div class="benefit-row">
        <div class="benefit-img">IMAGE</div>
        <div class="benefit-text">
          <h3>リアルタイムでデータを可視化</h3>
          <p>散在していたデータを一元管理。ダッシュボードでリアルタイムに状況を把握し、迅速な意思決定を支援します。</p>
        </div>
      </div>
      <div class="benefit-row">
        <div class="benefit-img">IMAGE</div>
        <div class="benefit-text">
          <h3>チーム全体の生産性向上</h3>
          <p>ナレッジの共有と業務の標準化により、属人化を解消。組織全体のパフォーマンスを底上げします。</p>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
