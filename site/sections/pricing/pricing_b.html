<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .pricing-section {
    padding: 80px 20px;
    background: #f9fafb;
    font-family: -apple-system, sans-serif;
  }
  .pricing-section h2 {
    font-size: 28px;
    font-weight: 800;
    color: #111;
    text-align: center;
    margin-bottom: 48px;
  }
  .pricing-list { max-width: 700px; margin: 0 auto; }
  .pricing-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 16px;
    gap: 12px;
  }
  .pricing-row .plan { font-size: 16px; font-weight: 700; color: #111; }
  .pricing-row .price-val { font-size: 24px; font-weight: 800; color: #3b82f6; }
  .pricing-row .price-val span { font-size: 14px; font-weight: 400; color: #888; }
  .pricing-row .features { font-size: 14px; color: #666; }
  .pricing-row .row-btn {
    padding: 10px 20px;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  @media (min-width: 768px) {
    .pricing-section { padding: 140px 40px; }
    .pricing-section h2 { font-size: 48px; margin-bottom: 72px; }
    .pricing-row { padding: 40px 44px; gap: 20px; margin-bottom: 24px; }
    .pricing-row .plan { font-size: 28px; }
    .pricing-row .price-val { font-size: 40px; }
    .pricing-row .price-val span { font-size: 24px; }
    .pricing-row .features { font-size: 24px; }
    .pricing-row .row-btn { padding: 16px 32px; font-size: 22px; }
  }
</style>
</head>
<body>
  <section class="pricing-section">
    <h2>料金プラン</h2>
    <div class="pricing-list">
      <div class="pricing-row">
        <div class="plan">ライト</div>
        <div class="price-val">¥9,800<span>/月</span></div>
        <div class="features">5名まで・基本機能・メールサポート</div>
        <button class="row-btn">選択する</button>
      </div>
      <div class="pricing-row">
        <div class="plan">スタンダード</div>
        <div class="price-val">¥29,800<span>/月</span></div>
        <div class="features">20名まで・全機能・チャットサポート・API連携</div>
        <button class="row-btn">選択する</button>
      </div>
      <div class="pricing-row">
        <div class="plan">プレミアム</div>
        <div class="price-val">¥98,000<span>/月</span></div>
        <div class="features">無制限・カスタム開発・専任サポート・SLA保証</div>
        <button class="row-btn">お問い合わせ</button>
      </div>
    </div>
  </section>
</body>
</html>
