<!-- description: 大見出し+シーン写真縦積み型 — h2大見出し＋4枚のシーン写真＋ラベルオーバーレイ（左上/右下交互）、SP・iPad同一1カラム -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service_F トレース — DR.VAPE 新習慣セクション</title>
<style>
/* ===== リセット ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; font-family: sans-serif; color: #111; }

/* ===== セクション ===== */
.service-f {
  width: 100%;
  padding: 48px 0 64px;
  background: #fff;
}

.service-f .inner {
  max-width: 800px;
  margin: 0 auto;
}

/* ===== 見出し ===== */
.service-f .section-heading {
  font-size: clamp(40px, 12vw, 68px);
  font-weight: 900;
  line-height: 1.2;
  color: #111;
  margin-bottom: 40px;
  letter-spacing: -0.01em;
  padding: 0 20px;
}

/* ===== シーンリスト ===== */
.scene-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ===== 各シーン ===== */
/* 左右に20pxずつ内側に寄せて画面幅100%を避ける */
.scene-item {
  position: relative;
  width: 100%;
  padding: 0 20px;
}

/* 画像プレースホルダー（16:7 比率） */
.scene-img {
  position: relative;
  width: 100%;
  aspect-ratio: 786 / 390;
  background: #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #888;
  font-size: 13px;
}

/* ===== ラベルバッジ ===== */
/* 左右端はphotoに flush、縦方向は12px内側 */
.scene-label {
  position: absolute;
  background: #111;
  color: #fff;
  font-size: clamp(12px, 3.5vw, 16px);
  font-weight: 700;
  line-height: 1.4;
  padding: 6px 12px;
  white-space: pre-line;
}

.label-tl { top: 12px; left: 0; }
.label-br { bottom: 12px; right: 0; }

/* ===== iPad (820px+) ===== */
@media (min-width: 768px) {
  .service-f {
    padding: 64px 0 80px;
  }
  .service-f .section-heading {
    font-size: 68px;
    margin-bottom: 48px;
    padding: 0 24px;
  }
  .scene-item {
    padding: 0 24px;
  }
  .scene-list {
    gap: 24px;
  }
  .scene-label {
    font-size: 18px;
    padding: 8px 16px;
  }
}
</style>
</head>
<body>

<section class="service-f">
  <div class="inner">

    <h2 class="section-heading">あなたも<br>香りを吸う<br>新習慣を</h2>

    <div class="scene-list">

      <div class="scene-item">
        <div class="scene-img">
          <span class="scene-label label-tl">テレワークの<br>おともに</span>
        </div>
      </div>

      <div class="scene-item">
        <div class="scene-img">
          <span class="scene-label label-br">外に出て<br>一服のかわりに</span>
        </div>
      </div>

      <div class="scene-item">
        <div class="scene-img">
          <span class="scene-label label-tl">オフの時間を<br>満喫するとき</span>
        </div>
      </div>

      <div class="scene-item">
        <div class="scene-img">
          <span class="scene-label label-br">集まって楽しむ<br>街でも自然でも</span>
        </div>
      </div>

    </div>
  </div>
</section>

</body>
</html>
