<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .cta-section {
    padding: 80px 20px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    text-align: center;
    font-family: -apple-system, sans-serif;
  }
  .cta-section h2 {
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 800;
    color: #fff;
    margin-bottom: 16px;
  }
  .cta-section p {
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .cta-btn {
    display: inline-block;
    padding: 18px 56px;
    background: #fff;
    color: #3b82f6;
    text-decoration: none;
    border-radius: 8px;
    font-size: 17px;
    font-weight: 700;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .cta-sub {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>
  <section class="cta-section">
    <h2>今すぐ始めましょう</h2>
    <p>14日間の無料トライアルで、すべての機能をお試しいただけます。</p>
    <a href="#" class="cta-btn">無料トライアルを開始する</a>
    <p class="cta-sub">クレジットカード不要・最短3分で開始</p>
  </section>
</body>
</html>
