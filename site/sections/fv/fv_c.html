<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .fv-minimal {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    text-align: center;
    padding: 40px 20px;
    font-family: -apple-system, sans-serif;
  }
  .fv-minimal h1 {
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 900;
    color: #111;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }
  .fv-minimal .subtitle {
    font-size: clamp(14px, 2vw, 18px);
    color: #888;
    margin-bottom: 40px;
  }
  .fv-minimal .cta-link {
    font-size: 16px;
    color: #333;
    text-decoration: none;
    font-weight: 600;
    border-bottom: 2px solid #333;
    padding-bottom: 2px;
    transition: color 0.2s;
  }
  .fv-minimal .cta-link:hover { color: #222; }
</style>
</head>
<body>
  <section class="fv-minimal">
    <h1>シンプルに、確実に。</h1>
    <p class="subtitle">余計な機能は要らない。本当に必要なことだけに集中できるツール。</p>
    <a href="#" class="cta-link">詳しく見る →</a>
  </section>
</body>
</html>
