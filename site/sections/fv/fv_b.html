<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .fv-split {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #fff;
    font-family: -apple-system, sans-serif;
    padding: 40px 20px;
    gap: 32px;
    max-width: 800px;
    margin-inline: auto;
  }
  .fv-text {
    flex: 1;
  }
  .fv-text .tag {
    display: inline-block;
    background: #f5f5f5;
    color: #333;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .fv-text h1 {
    font-size: clamp(24px, 4vw, 44px);
    font-weight: 800;
    color: #111;
    line-height: 1.3;
    margin-bottom: 20px;
  }
  .fv-text p {
    font-size: 16px;
    color: #666;
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .fv-text .btn {
    display: inline-block;
    padding: 14px 40px;
    background: #333;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
  }
  .fv-text .btn:hover { background: #222; }
  .fv-image {
    flex: 1;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #eee, #ddd);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 18px;
    font-weight: 600;
    width: 100%;
    min-height: 200px;
  }
  @media (min-width: 768px) {
    .fv-split {
      padding: 72px 40px;
      gap: 48px;
      max-width: 1000px;
    }
    .fv-text .tag {
      font-size: 16px;
      padding: 10px 22px;
      margin-bottom: 28px;
    }
    .fv-text h1 {
      margin-bottom: 28px;
    }
    .fv-text p {
      font-size: 20px;
      margin-bottom: 48px;
    }
    .fv-text .btn {
      padding: 22px 64px;
      font-size: 18px;
      border-radius: 12px;
    }
    .fv-image { min-height: 400px; border-radius: 24px; font-size: 24px; }
  }
</style>
</head>
<body>
  <section class="fv-split">
    <div class="fv-text">
      <span class="tag">業界シェアNo.1</span>
      <h1>成果を出すための<br>オールインワンツール</h1>
      <p>煩雑な業務をシンプルに。チーム全体の生産性を向上させる統合プラットフォームで、ビジネスの成長を支援します。</p>
      <a href="#" class="btn">資料をダウンロード</a>
    </div>
    <div class="fv-image">IMAGE PLACEHOLDER</div>
  </section>
</body>
</html>
