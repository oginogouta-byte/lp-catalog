<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    /* テイスト適用時はここを変更 */
    --pain-bg: #555;
    --pain-bubble-bg: #222;
    --pain-heading-color: #fff;
    --pain-text-color: #fff;
    --pain-accent-color: #ccc;
    --pain-pointer-color: #fff;
    --pain-wave-color: #fff;
    --pain-transition-bg: #fff;
    --pain-transition-color: #333;
    /* 人物画像フィルター — テイスト適用時はここを変更 */
    --person-filter: grayscale(100%) brightness(0.9);
    --person-blend: normal;
    --person-overlay-color: transparent;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .pain-section {
    position: relative;
    padding: 56px 0 0;
    background: var(--pain-bg);
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    color: var(--pain-text-color);
    overflow: hidden;
  }

  /* ── 見出し ── */
  .pain-heading {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 3;
  }

  .pain-heading-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1.5;
    color: var(--pain-heading-color);
  }

  .pain-heading-title .accent {
    font-size: 28px;
    font-weight: 900;
  }

  .pain-heading-pointer {
    display: block;
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 12px solid var(--pain-pointer-color);
    margin: 10px auto 0;
  }

  /* ── メインコンテンツ ── */
  .pain-content {
    position: relative;
    max-width: 800px;
    margin-inline: auto;
    min-height: auto;
    padding: 0 16px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* ── 人物画像プレースホルダー ── */
  .pain-person {
    position: relative;
    z-index: 1;
    left: auto;
    top: auto;
    transform: none;
    width: 180px;
    height: 240px;
    order: 2;
    margin: 8px 0;
  }

  .pain-person-inner {
    width: 100%;
    height: 100%;
    background: #777;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #aaa;
    letter-spacing: 0.08em;
    position: relative;
    overflow: hidden;
    filter: var(--person-filter);
    mix-blend-mode: var(--person-blend);
  }

  .pain-person-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--person-overlay-color);
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* ── モクモク雲型吹き出し ── */
  .pain-bubble {
    position: relative;
    z-index: 2;
    background: var(--pain-bubble-bg);
    color: var(--pain-text-color);
    padding: 16px 20px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    line-height: 1.7;
    width: 85%;
    max-width: 300px;
    top: auto !important;
    left: auto !important;
    right: auto !important;
    bottom: auto !important;
    transform: none !important;
  }

  /* モクモク雲型を box-shadow の多重丸で表現 */
  .pain-bubble::before,
  .pain-bubble::after {
    content: '';
    position: absolute;
    background: var(--pain-bubble-bg);
    border-radius: 50%;
    z-index: -1;
  }

  /* 左上の丸 */
  .pain-bubble::before {
    width: 60px;
    height: 50px;
    top: -18px;
    left: -12px;
  }

  /* 右下の丸 */
  .pain-bubble::after {
    width: 50px;
    height: 45px;
    bottom: -14px;
    right: -10px;
  }

  /* 各吹き出しに追加の丸をborder-radiusで表現 */
  .pain-bubble {
    border-radius: 20px;
    /* 各角を不揃いにしてモクモク感を出す */
  }

  .pain-bubble--1 {
    border-radius: 40px 24px 32px 20px;
  }
  .pain-bubble--1::before { width: 55px; height: 45px; top: -16px; left: 20px; }
  .pain-bubble--1::after { width: 45px; height: 40px; bottom: -12px; right: 15px; }

  .pain-bubble--2 {
    border-radius: 24px 36px 20px 32px;
  }
  .pain-bubble--2::before { width: 50px; height: 42px; top: -15px; right: 20px; left: auto; }
  .pain-bubble--2::after { width: 48px; height: 38px; bottom: -10px; left: 25px; right: auto; }

  .pain-bubble--3 {
    border-radius: 32px 20px 36px 24px;
  }
  .pain-bubble--3::before { width: 52px; height: 44px; top: -14px; left: 30px; }
  .pain-bubble--3::after { width: 44px; height: 36px; bottom: -12px; right: 20px; }

  .pain-bubble--4 {
    border-radius: 20px 32px 24px 36px;
  }
  .pain-bubble--4::before { width: 48px; height: 40px; top: -14px; right: 15px; left: auto; }
  .pain-bubble--4::after { width: 50px; height: 42px; bottom: -14px; left: 20px; right: auto; }

  .pain-bubble--5 {
    border-radius: 36px 24px 20px 32px;
  }
  .pain-bubble--5::before { width: 54px; height: 46px; top: -16px; left: 15px; }
  .pain-bubble--5::after { width: 46px; height: 38px; bottom: -10px; right: 25px; }

  .pain-bubble .highlight {
    font-weight: 800;
    font-size: 1.15em;
    color: var(--pain-accent-color);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ── SP版 吹き出し配置 ── */
  .pain-bubble--1 { order: 1; align-self: flex-start; }
  .pain-bubble--2 { order: 1; align-self: flex-end; }
  .pain-bubble--3 { order: 3; align-self: flex-start; }
  .pain-bubble--4 { order: 3; align-self: flex-end; }
  .pain-bubble--5 { order: 3; align-self: flex-start; }

  .pain-bubble::before,
  .pain-bubble::after {
    display: none;
  }

  .pain-bubble--1,
  .pain-bubble--2,
  .pain-bubble--3,
  .pain-bubble--4,
  .pain-bubble--5 {
    border-radius: 20px;
  }

  /* ── 波型 ── */
  .pain-wave {
    position: relative;
    margin-top: -10px;
  }

  .pain-wave svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .pain-transition {
    background: var(--pain-transition-bg);
    text-align: center;
    padding: 40px 24px 60px;
  }

  .pain-transition-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.06em;
    line-height: 1.6;
    color: var(--pain-transition-color);
  }

  /* ── PC版調整（サイズ拡大のみ、レイアウトはSPと同じ縦積み） ── */
  @media (min-width: 768px) {
    .pain-section {
      padding: 100px 0 0;
    }

    .pain-heading {
      margin-bottom: 28px;
    }

    .pain-heading-title {
      font-size: 40px;
    }

    .pain-heading-title .accent {
      font-size: 50px;
    }

    .pain-heading-pointer {
      border-left-width: 24px;
      border-right-width: 24px;
      border-top-width: 20px;
      margin-top: 16px;
    }

    .pain-content {
      padding: 0 32px 40px;
      gap: 18px;
    }

    .pain-person {
      width: 320px;
      height: 420px;
      margin: 14px 0;
    }

    .pain-bubble {
      padding: 28px 36px;
      font-size: 26px;
      width: 90%;
      max-width: 520px;
    }

    .pain-bubble .highlight {
      font-size: 1.15em;
    }

    .pain-transition {
      padding: 56px 32px 80px;
    }

    .pain-transition-text {
      font-size: 36px;
    }
  }
</style>
</head>
<body>
  <section class="pain-section">

    <!-- 見出し -->
    <div class="pain-heading">
      <h2 class="pain-heading-title">こんな<span class="accent">お悩み</span>ありませんか？</h2>
      <span class="pain-heading-pointer"></span>
    </div>

    <!-- メインコンテンツ -->
    <div class="pain-content">

      <!-- 人物画像プレースホルダー -->
      <div class="pain-person">
        <div class="pain-person-inner">人物画像</div>
      </div>

      <!-- 吹き出し5つ -->
      <div class="pain-bubble pain-bubble--1">
        パサつきが<br><span class="highlight">コンプレックス</span>…
      </div>
      <div class="pain-bubble pain-bubble--2">
        朝、髪を整えるのに<br><span class="highlight">時間</span>がかかる…
      </div>
      <div class="pain-bubble pain-bubble--3">
        好きな<span class="highlight">髪型</span>で<br>いられない…
      </div>
      <div class="pain-bubble pain-bubble--4">
        サラサラで<br><span class="highlight">流れるような髪</span><br>がいい
      </div>
      <div class="pain-bubble pain-bubble--5">
        美容室での<br>仕上がりが<span class="highlight">不安</span>…
      </div>

    </div>

    <!-- 波型区切り -->
    <div class="pain-wave">
      <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C360,120 1080,0 1440,80 L1440,120 L0,120 Z" fill="var(--pain-wave-color)"/>
      </svg>
    </div>

    <!-- 遷移テキスト -->
    <div class="pain-transition">
      <p class="pain-transition-text">そんなお悩みの方に</p>
    </div>

  </section>
</body>
</html>
